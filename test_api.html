<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <h1>🔍 Backend Connection Test</h1>
    
    <button onclick="testHealth()">Test Health Check</button>
    <button onclick="testFetch()">Test Fetch API</button>
    
    <div id="result">결과가 여기에 표시됩니다</div>

    <script>
        async function testHealth() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing health endpoint...';
            result.className = '';
            
            try {
                const response = await fetch('http://localhost:8000/health');
                const data = await response.json();
                result.innerHTML = '✅ Health check SUCCESS: ' + JSON.stringify(data);
                result.className = 'success';
            } catch (error) {
                result.innerHTML = '❌ Health check FAILED: ' + error.message;
                result.className = 'error';
                console.error('Full error:', error);
            }
        }
        
        async function testFetch() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing fetch API...';
            result.className = '';
            
            try {
                // Test with empty FormData
                const formData = new FormData();
                const blob = new Blob(['test dxf content'], { type: 'application/dxf' });
                formData.append('file', blob, 'test.dxf');
                
                const response = await fetch('http://localhost:8000/api/detect-boundary', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                result.innerHTML = '✅ Fetch SUCCESS: ' + JSON.stringify(data).substring(0, 200) + '...';
                result.className = 'success';
            } catch (error) {
                result.innerHTML = '❌ Fetch FAILED: ' + error.message;
                result.className = 'error';
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
